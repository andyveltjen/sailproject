name: Sail
slug: sail
type: theme
version: 1.0.0
description: "Custom theme voor het SAIL Project, gebaseerd op Learn2"
icon: book
author:
  name: SAIL Research Team
  email: info@sailproject.ai
homepage: https://sailproject.ai
license: MIT

dependencies:
  - { name: grav, version: '>=1.5.10' }

form:
  validation: loose
  fields:
    top_level_version:
        type: toggle
        label: Top Level Version
        highlight: 1
        default: 0
        options:
          1: Enabled
          0: Disabled
        validate:
          type: bool

    home_url:
        type: text
        label: Home URL
        placeholder: http://getgrav.org
        validate:
          type: text

    google_analytics_code:
        type: text
        label: Google Analytics Code
        placeholder: UA-XXXXXXXX-X
        validate:
          type: text

    github.position:
        type: select
        size: medium
        classes: fancy
        label: GitHub Position
        options:
            top: Top
            bottom: Bottom
            off: Off

    github.tree:
        type: text
        label: GitHub Tree
        default: https://github.com/getgrav/grav-skeleton-rtfm-site/blob/develop/

    github.commits:
        type: text
        label: GitHub Commits
        default: https://github.com/getgrav/grav-skeleton-rtfm-site/commits/develop/
