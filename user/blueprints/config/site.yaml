extends@: site

form:
  fields:
    tabs:
      fields:
        wiki_tab:
          type: tab
          title: Wiki

          fields:
            wiki.active:
              type: toggle
              label: Wiki publiek zichtbaar
              help: 'Zet aan om de wiki te activeren voor bezoekers. Zet uit om een boodschap te tonen zolang de inhoud nog niet klaar is.'
              highlight: 1
              default: 0
              options:
                1: Aan
                0: Uit
              validate:
                type: bool

            wiki.inactive_message:
              type: textarea
              label: Boodschap bij inactieve wiki
              help: 'Deze tekst zien bezoekers op alle wiki-pagina''s wanneer de wiki uitgeschakeld is.'
              rows: 3
