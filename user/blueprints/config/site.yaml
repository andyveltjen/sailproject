extends@: site

form:
  fields:
    wiki_section:
      type: section
      title: Wiki of Research
      underline: true

      fields:
        wiki.active:
          type: toggle
          label: Wiki publiek zichtbaar
          help: 'Aan = wiki is zichtbaar voor bezoekers. Uit = bezoekers zien een boodschap dat de wiki nog niet beschikbaar is.'
          highlight: 1
          default: 0
          options:
            1: Aan
            0: Uit
          validate:
            type: bool

        wiki.inactive_message:
          type: textarea
          label: Boodschap bij inactieve wiki
          help: 'Deze tekst zien bezoekers wanneer de wiki uitgeschakeld is.'
          rows: 3

    search_section:
      type: section
      title: AI Zoekfunctie
      underline: true

      fields:
        search.active:
          type: toggle
          label: AI zoekfunctie actief
          help: 'Aan = bezoekers kunnen vragen stellen aan de wiki via Claude AI. Vereist een ANTHROPIC_API_KEY in het .env bestand.'
          highlight: 1
          default: 1
          options:
            1: Aan
            0: Uit
          validate:
            type: bool
